# === PERFIL CAMA DE VIDRIO (probado y funcionando 2026-06-13) ===
# Cama vidrio+magnetica+aluminio (Ender V3, sandwich grueso).
# Clave: cama 70C (compensa el grosor) + brim 5mm. Z-offset firmware: M851 Z-1.47.
# PrusaSlicer config — Ender 3 + Creality PLA White
# Uso: prusa-slicer --load ender3_pla.ini --export-gcode -o out.gcode in.stl

# --- impresora ---
printer_technology = FFF
gcode_flavor = marlin
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 250
nozzle_diameter = 0.4
z_offset = 0
use_relative_e_distances = 1
layer_gcode = G92 E0

# --- filamento (PLA) ---
filament_diameter = 1.75
temperature = 205
first_layer_temperature = 210
bed_temperature = 70
first_layer_bed_temperature = 70
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
disable_fan_first_layers = 1
slowdown_below_layer_time = 8
min_print_speed = 10

# --- calidad ---
layer_height = 0.2
first_layer_height = 0.24
perimeters = 3
top_solid_layers = 4
bottom_solid_layers = 4
fill_density = 15%
fill_pattern = grid

# --- velocidades (mm/s) ---
perimeter_speed = 50
infill_speed = 60
first_layer_speed = 20
travel_speed = 120
external_perimeter_speed = 30

# --- retracción (DIRECT DRIVE: corta) ---
retract_length = 0.8
retract_speed = 40
retract_lift = 0.2

# --- adherencia ---
skirts = 0
skirt_distance = 3
brim_width = 5

# --- start/end gcode (usa la malla ABL guardada con M420 S1) ---
start_gcode = G90\nM83\nM104 S[first_layer_temperature]\nM140 S[first_layer_bed_temperature]\nM190 S[first_layer_bed_temperature]\nM109 S[first_layer_temperature]\nG28\nM420 S1\nG92 E0\nG1 Z0.3 F3000\nG1 X5 Y20 F5000\nG1 X5 Y190 E14 F1400\nG1 X5.6 Y190 F1000\nG1 X5.6 Y20 E14 F1400\nG92 E0
end_gcode = M104 S0\nM140 S0\nM107\nG91\nG1 E-1 F1800\nG1 Z8 F1000\nG90\nG1 X0 Y200 F6000\nM84
